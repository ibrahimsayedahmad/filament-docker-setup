name: generate-docs-screenshots

on:
  push:
    tags: '*'

permissions:
  contents: write

jobs:
  take-screenshots:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      # persist-credentials: true is required so `git-auto-commit-action` below
      # can push the new screenshots. Tag-only trigger means only maintainers
      # invoke this workflow.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0 # zizmor: ignore[artipacked]
      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.composer/cache/files
          key: composer-screenshots-${{ hashFiles('docs-assets/app/composer.json') }}
          restore-keys: |
            composer-screenshots-
      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.34.1
        with:
          php-version: 8.5
          extensions: mbstring, pdo, pdo_sqlite
          coverage: none
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Cache Puppeteer browser
        id: puppeteer-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('docs-assets/screenshots/package-lock.json') }}
      - name: Install screenshot dependencies
        run: |
          cd docs-assets/screenshots
          npm ci --ignore-scripts
      - name: Install Puppeteer browser
        if: steps.puppeteer-cache.outputs.cache-hit != 'true'
        run: |
          cd docs-assets/screenshots
          npx puppeteer browsers install chrome
      - name: Cache app npm dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: docs-assets/app/node_modules
          key: npm-screenshots-app-${{ hashFiles('docs-assets/app/package-lock.json') }}
      - name: Set up app
        run: |
          cd docs-assets/app
          composer install --no-interaction
          npm ci --ignore-scripts && npm run build
          php artisan serve &
      - name: Take screenshots
        run: |
          cd docs-assets/screenshots
          node script
      - name: Pull changes
        run: git pull
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.0.1
        with:
          commit_message: >
            chore: take docs screenshots
