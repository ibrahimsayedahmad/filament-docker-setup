name: format-and-build

on:
  push:
    branches:
      - 4.x

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-and-build:
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: format and build') }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # Uses a maintainer PAT so the auto-commit push can bypass branch protection;
        # the default GITHUB_TOKEN pushes as `github-actions[bot]` and gets rejected.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # zizmor: ignore[artipacked]
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
      - name: Cache Composer package downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.composer/cache/files
          key: composer-files-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-files-
      - name: Cache vendor
        id: vendor-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: vendor-${{ runner.os }}-${{ hashFiles('composer.lock') }}
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Cache Pint cache
        # SHA in primary key always saves a fresh cache. Restore-keys fall back only
        # within the same composer.lock hash so a composer update invalidates the cache.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .pint.cache
          key: pint-${{ github.ref_name }}-${{ hashFiles('composer.lock') }}-${{ github.sha }}
          restore-keys: |
            pint-${{ github.ref_name }}-${{ hashFiles('composer.lock') }}-
      - name: Cache Prettier cache
        # Same pattern, keyed on package-lock.json so an npm install invalidates the cache.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .prettiercache
          key: prettier-${{ github.ref_name }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            prettier-${{ github.ref_name }}-${{ hashFiles('package-lock.json') }}-
      - name: Cache Rector cache
        # Same pattern as Pint; rector.php sets cacheDirectory to .rector.cache.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .rector.cache
          key: rector-${{ github.ref_name }}-${{ hashFiles('composer.lock') }}-${{ github.sha }}
          restore-keys: |
            rector-${{ github.ref_name }}-${{ hashFiles('composer.lock') }}-
      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: 8.5
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm
      - name: Install Composer dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: composer install --no-interaction --no-scripts
      - name: Install npm dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts
      - name: Ensure Rector cache directory exists
        # Defensive: rector should create this via withCache(), but it's
        # silently missing in CI. Pre-creating costs nothing.
        run: mkdir -p .rector.cache
      - name: Run code style fixes
        run: composer cs
      - name: Inspect tool caches after composer cs (temporary diagnostic)
        if: always()
        run: |
          echo "=== after composer cs ==="
          du -sh .rector.cache 2>&1 || true
          find .rector.cache -type f 2>/dev/null | wc -l
          ls -la .pint.cache 2>&1 || true
          echo
          echo "=== hunt for rector cache files anywhere reasonable ==="
          # The on-disk shape is XX/YY/HASH.php under a cache dir. Search broadly.
          find . /tmp "$HOME" -maxdepth 5 -type d -name '.rector.cache*' 2>/dev/null | head -20
          echo "--- any *.php cache files written under runner home ---"
          find "$HOME" -maxdepth 6 -type f -name '*.php' -newer /etc/hostname 2>/dev/null | grep -i rector | head -10
          echo
          echo "=== dump resolved cache_dir from rector.php ==="
          # Tiny PHP probe — load rector.php and read back the CACHE_DIR parameter
          # that withCache() sets via SimpleParameterProvider.
          php -r '
            require __DIR__."/vendor/autoload.php";
            $rectorConfigBuilder = require __DIR__."/rector.php";
            $rectorConfigBuilder->__invoke(new \Rector\Config\RectorConfig());
            echo "CACHE_DIR=".var_export(
              \Rector\Configuration\Parameter\SimpleParameterProvider::provideStringParameter(\Rector\Configuration\Option::CACHE_DIR),
              true
            ).PHP_EOL;
          ' 2>&1 | tail -10 || true
      - name: Build assets
        run: npm run build
      - name: Pull changes
        run: git pull --rebase --autostash
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: 'chore: format and build'
