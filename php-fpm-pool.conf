[global]
daemonize = no
error_log = /proc/self/fd/2

[www]
listen = 9000
user = www-data
group = www-data

pm = dynamic
pm.max_children = 100
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500

access.log = /proc/self/fd/2
catch_workers_output = yes
clear_env = no
